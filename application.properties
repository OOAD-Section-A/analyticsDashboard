# Analytics Dashboard - Spring Boot Configuration
# ============================================

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=analytics-dashboard

# Logging Configuration
logging.level.root=INFO
logging.level.com.analytics=DEBUG
logging.level.dashboard=DEBUG
logging.level.service=DEBUG
logging.level.engine=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration (already handled in controller)
server.servlet.jsp.init-parameters.development=true

# Application Info
app.name=Analytics Dashboard Subsystem
app.version=1.0.0
app.description=Reports and Analytics Dashboard for Supply Chain Management

# Jackson Configuration (JSON serialization)
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
